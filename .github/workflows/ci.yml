name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always


jobs:
  build:
    name: build ${{ matrix.target }}
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            features: metal
          - target: x86_64-apple-darwin
            os: macos-latest
            features: metal
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            features: ""
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            features: ""
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl toolchain
        if: contains(matrix.target, 'linux-musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install C/C++ toolchain for native build
        if: contains(matrix.target, 'linux-musl')
        run: sudo apt-get install -y build-essential

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-cargo-

      - name: Install cmake
        if: contains(matrix.target, 'linux-musl')
        run: sudo apt-get install -y cmake

      - name: Test
        if: matrix.target == 'x86_64-apple-darwin'
        run: cargo test

      - name: LLM tests (Metal GPU)
        if: matrix.target == 'x86_64-apple-darwin'
        run: cargo test --features metal -- --ignored --nocapture

      - name: Build
        env:
          AWS_LC_SYS_CMAKE_BUILDER: "1"
        run: |
          FEATURES="${{ matrix.features }}"
          if [ -n "$FEATURES" ]; then
            cargo build --release --target ${{ matrix.target }} --features "$FEATURES"
          else
            cargo build --release --target ${{ matrix.target }}
          fi

  lint:
    name: lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: lint-cargo-${{ hashFiles('Cargo.lock') }}
      - run: cargo clippy -- -D warnings
      - run: cargo fmt -- --check
